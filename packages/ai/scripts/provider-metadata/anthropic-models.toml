# =============================================================================
# THINKING MODE REFERENCE
# =============================================================================
# 
# thinking_mode:
#   "adaptive" - Claude decides when/how much to think (Opus 4.6, Sonnet 4.6)
#   "manual"   - Requires explicit budget_tokens
#   "both"     - Supports both adaptive and manual (Sonnet 4.6)
#   "none"     - No extended thinking
#
# interleaved_thinking:
#   "auto"   - Automatically enabled with adaptive thinking (Opus 4.6)
#   "header" - Requires interleaved-thinking-2025-05-14 beta header
#   "none"   - Not supported (Haiku 4.5, Sonnet 3.7)
#
# thinking_output:
#   "summarized" - Default for Claude 4+ (thinking is summarized)
#   "full"       - Full thinking output (Sonnet 3.7, or with dev-full-thinking header)

# =============================================================================
