# =============================================================================
# CORE API PARAMETERS
# =============================================================================
# Parameters supported by all Anthropic models

[core_parameters]
supported = [
  "temperature",      # 0.0-1.0, default 1.0
  "top_p",            # 0.0-1.0, nucleus sampling
  "top_k",            # undocumented but works
  "max_tokens",       # required, model-dependent max
  "stop_sequences",   # custom stop strings
  "stream",           # SSE streaming
  "system",           # system prompt
  "tools",            # tool definitions
  "tool_choice",      # tool selection preference
  "metadata",         # request metadata
]

not_supported = [
  "frequency_penalty",
  "presence_penalty",
  "repetition_penalty",
  "min_p",
  "seed",
  "logprobs",
  "logit_bias",
]

